<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fuel Dashboard</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
  padding:40px;
}

/* header */
h1{
  margin-bottom:10px;
}

/* status */
.status{
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

/* cards */
.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  border:1px solid #333;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-4px);
}

/* cheapest highlight */
.cheapest{
  border:2px solid #22c55e;
}

/* price */
.price{
  font-size:22px;
  font-weight:bold;
  margin-top:8px;
}

/* color helpers */
.green{color:#22c55e;}
.red{color:#ef4444;}
.gray{color:#aaa;}

</style>
</head>

<body>

<h1>⛽ Bränslepriser Skellefteå</h1>

<div id="status" class="status gray">
Laddar data...
</div>

<h2 id="cheapestBox"></h2>

<div id="grid" class="grid"></div>

<script>

async function fetchFuel(){

  const status = document.getElementById("status");
  const grid = document.getElementById("grid");

  try{

    const res = await fetch("/api/fuel");

    if(!res.ok){
      throw new Error("API svarade inte");
    }

    const data = await res.json();

    if(!data || data.length === 0){
      status.innerHTML = "<span class='red'>❌ Ingen data hittades</span>";
      return;
    }

    status.innerHTML = "<span class='green'>✅ Data laddad</span>";

    // hitta billigaste
    let cheapest = data.reduce((a,b)=> a.price < b.price ? a : b);

    document.getElementById("cheapestBox").innerHTML =
      `<span class="green">Billigast: ${cheapest.station} — ${cheapest.price} kr</span>`;

    // rendera
    grid.innerHTML = data.map(d => `
      <div class="card ${d.station === cheapest.station ? 'cheapest' : ''}">
        <div class="gray">${d.station}</div>
        <div class="price">${d.price.toFixed(2)} kr</div>
      </div>
    `).join("");

  }catch(err){

    status.innerHTML = `
      <span class="red">❌ API FUNKAR INTE</span><br>
      <small>${err.message}</small>
    `;

  }
}

fetchFuel();

</script>

</body>
</html>
