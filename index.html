<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel App</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:40px;
}
.card{
  background:#222;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}
.success{
  color:#22c55e;
}
.error{
  color:#ef4444;
}
</style>

</head>
<body>

<h1>🚀 Fuel API Test</h1>

<div id="status" class="card">Laddar...</div>

<script>
async function checkAPI(){
  try{
    const res = await fetch("/api/hello");

    if(!res.ok){
      throw new Error("API svarade inte");
    }

    const data = await res.json();

    document.getElementById("status").innerHTML = `
      <div class="success">✅ API FUNKAR!</div>
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;

  }catch(err){

    document.getElementById("status").innerHTML = `
      <div class="error">❌ API FUNKAR INTE</div>
      <p>${err.message}</p>
      <p>Kontrollera /api/hello</p>
    `;
  }
}

checkAPI();
</script>

</body>
</html>
